proxy_buffering off;
client_max_body_size 512M;
proxy_read_timeout 300;
proxy_connect_timeout 300;
proxy_send_timeout 300;

# En-têtes pour Cloudflare Flexible
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto https;

server {
    listen 80 default_server;
    server_name _;
    location / { root /usr/share/nginx/html; index index.html; try_files $uri $uri/ /index.html; }
    location /app/ { proxy_pass http://web:80/; }
    location /api/ { proxy_pass http://api:8000; }
}

server {
    listen 80;
    server_name mattermost.educ-ai.fr;

    # ROUTE D'INTERCEPTION SSO POUR INJECTER LE SCOPE
    location = /sso/keycloak/authorize {
        return 302 https://keycloak.educ-ai.fr/realms/but-tc/protocol/openid-connect/auth?scope=openid+profile+email&$args;
    }

    location / {
        proxy_pass http://mattermost:8065;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name keycloak.educ-ai.fr;
    location / { proxy_pass http://keycloak:8080; }
}

server {
    listen 80;
    server_name nextcloud.educ-ai.fr;
    location / { proxy_pass http://nextcloud:80; }
}

server {
    listen 80;
    server_name odoo.educ-ai.fr;
    location / { proxy_pass http://odoo:8069; }
}
