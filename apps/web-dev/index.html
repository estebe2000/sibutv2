<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="manifest" href="/appdev/manifest.json" />
    <meta name="theme-color" content="#1971c2" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Skills Hub Dev">
    <link rel="apple-touch-icon" href="/appdev/icon-192.png">
    <title>Skills Hub</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/appdev/sw.js', { scope: '/appdev/' })
            .then(reg => console.log('SW registered'))
            .catch(err => console.log('SW error', err));
        });
      }
    </script>
    <!-- AnythingLLM Embed -->
    <script
      data-embed-id="10f42633-c155-4ff1-803a-e720a7995471"
      data-base-api-url="http://localhost:3001/api/embed"
      data-chat-icon="chatBubble"
      data-assistant-name="Assistant Skills Hub"
      data-greeting="Bonjour ! Je suis l'assistant Skills Hub. Posez-moi vos questions sur les cours ou les enseignants."
      data-button-color="#1971c2"
      data-user-bg-color="#1971c2"
      data-no-sponsor="true"
      src="http://localhost:3001/embed/anythingllm-chat-widget.min.js">
    </script>
  </body>
</html>
