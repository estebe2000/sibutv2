server_name: "educ-ai.fr"
pid_file: /data/homeserver.pid
listeners:
  - port: 8008
    resources:
    - compress: false
      names:
      - client
      - federation
    tls: false
    type: http
    x_forwarded: true
database:
  name: psycopg2
  allow_unsafe_locale: true
  args:
    user: synapse
    password: synapse_password
    database: synapse
    host: db_synapse
    port: 5432
    cp_min: 5
    cp_max: 10
log_config: "/data/educ-ai.fr.log.config"
media_store_path: /data/media_store
