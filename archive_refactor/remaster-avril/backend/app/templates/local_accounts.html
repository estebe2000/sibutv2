{% extends "dashboard.html" %}

{% block content %}
<div class="space-y-8 animate-in slide-in-from-bottom duration-500">
    <header class="flex justify-between items-center">
        <div>
            <h2 class="text-3xl font-black tracking-tight">Gestion des Utilisateurs</h2>
            <p class="text-slate-400 font-bold">Synchronisation et rôles des comptes locaux</p>
        </div>
        <button
            class="px-6 py-3 bg-blue-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-blue-200 hover:scale-[1.02] transition-all">+
            Nouvel Utilisateur</button>
    </header>

    <div class="bg-white rounded-[3rem] p-10 border border-slate-200 shadow-sm overflow-hidden">
        <table class="w-full text-left">
            <thead>
                <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                    <th class="pb-4 px-4">Utilisateur</th>
                    <th class="pb-4 px-4">UID LDAP</th>
                    <th class="pb-4 px-4">Rôle</th>
                    <th class="pb-4 px-4 text-right">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-50">
                {% for u in all_users %}
                <tr class="group hover:bg-slate-50 transition-all">
                    <td class="py-6 px-4">
                        <div class="flex items-center gap-3">
                            <div
                                class="w-8 h-8 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center font-black text-xs uppercase">
                                {{ u.full_name[:2] }}</div>
                            <span class="font-bold text-slate-700">{{ u.full_name }}</span>
                        </div>
                    </td>
                    <td class="py-6 px-4">
                        <code
                            class="text-xs bg-slate-100 px-2 py-1 rounded text-slate-500 font-mono">{{ u.ldap_uid }}</code>
                    </td>
                    <td class="py-6 px-4">
                        <span
                            class="px-3 py-1 bg-slate-100 text-[10px] font-black rounded-full uppercase tracking-tighter">{{
                            u.role.value }}</span>
                    </td>
                    <td class="py-6 px-4 text-right">
                        <button class="p-2 text-slate-400 hover:text-blue-600 transition-colors"><svg
                                xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M12 20h9" />
                                <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z" />
                            </svg></button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
