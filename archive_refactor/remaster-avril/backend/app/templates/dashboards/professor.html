<div class="space-y-10 animate-in slide-in-from-right duration-700">
    <header>
        <h2 class="text-4xl font-black tracking-tight italic text-slate-900">Pilotage Pédagogique</h2>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="md:col-span-2 space-y-8">
            <div class="bg-gradient-to-br from-blue-600 to-indigo-800 rounded-[3rem] p-10 text-white shadow-xl relative overflow-hidden">
                <h3 class="text-2xl font-black mb-6 italic relative z-10 text-white">SAÉ sous votre responsabilité (Semestre 2)</h3>
                <div class="space-y-4 relative z-10">
                    {% for sae in data.my_saes %}
                    <div class="bg-white/10 p-6 rounded-2xl border border-white/10 flex justify-between items-center hover:bg-white/20 transition-all cursor-pointer">
                        <div>
                            <p class="text-[10px] font-black uppercase opacity-60">{{ sae.code }}</p>
                            <p class="font-bold">{{ sae.label }}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] uppercase font-bold opacity-60">Parcours</p>
                            <p class="text-sm font-black">{{ sae.pathway[:15] }}...</p>
                        </div>
                    </div>
                    {% endfor %}
                </div>
                <div class="absolute -bottom-10 -right-10 opacity-10 rotate-12">
                    <svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                </div>
            </div>
        </div>

        <div class="space-y-8">
            {% include 'components/news_feed.html' %}

            <div class="bg-primary/5 rounded-[2.5rem] p-8 border border-primary/10">
                <h3 class="font-black text-primary text-sm mb-4 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    Prochains RDV
                </h3>
                <p class="text-xs font-bold text-slate-600">Soutenance SAÉ 2.1</p>
                <p class="text-[10px] text-slate-400 font-medium">Demain, 14:00 - Salle 102</p>
            </div>
        </div>
    </div>
</div>
