<section class="bg-white rounded-[2.5rem] p-8 border border-slate-200 shadow-sm">
    <h3 class="text-xl font-black mb-6 flex items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Annonces Matrix
    </h3>
    <div class="space-y-6">
        {% for item in news %}
        <div class="flex gap-4 group animate-in slide-in-from-left duration-300">
            <div class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center font-black text-xs text-slate-400 group-hover:bg-blue-600 group-hover:text-white transition-all border border-slate-100">
                {{ item.sender[0] | upper }}
            </div>
            <div class="flex-1 min-w-0">
                <div class="flex justify-between items-start mb-1">
                    <p class="text-xs font-black text-slate-800 uppercase tracking-tighter">{{ item.sender }}</p>
                    <p class="text-[9px] font-black text-blue-400 uppercase italic">{{ item.timestamp.strftime('%d/%m %H:%M') if item.timestamp }}</p>
                </div>
                <div class="text-xs text-slate-500 font-bold leading-relaxed line-clamp-3">
                    {{ item.content | safe }}
                </div>
            </div>
        </div>
        {% else %}
        <div class="py-10 text-center opacity-20">
            <p class="text-sm font-black italic">Aucune annonce récente</p>
        </div>
        {% endfor %}
    </div>
    <a href="/matrix" class="block w-full mt-8 py-3 text-center bg-slate-50 text-slate-400 font-black text-[10px] uppercase tracking-widest rounded-xl hover:bg-blue-50 hover:text-blue-600 transition-all italic">Ouvrir la discussion complète</a>
</section>
