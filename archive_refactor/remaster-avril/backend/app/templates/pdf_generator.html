{% extends "dashboard.html" %}

{% block content %}
<div class="space-y-8 animate-in slide-in-from-bottom duration-500">
    <header>
        <h2 class="text-3xl font-black tracking-tight italic">Génération de Fiches PDF</h2>
        <p class="text-slate-400 font-bold">Exportation massive des fiches pédagogiques (SAÉ / Ressources)</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- SAÉ -->
        <button class="bg-slate-900 text-white p-12 rounded-[3rem] shadow-2xl hover:bg-blue-600 transition-all group text-left relative overflow-hidden">
            <div class="relative z-10">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="mb-6 opacity-40 group-hover:rotate-12 transition-transform"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>
                <span class="text-2xl font-black block">Fiches SAÉ</span>
                <span class="text-[10px] font-bold uppercase tracking-[0.2em] opacity-40">Générer tout le semestre</span>
            </div>
            <div class="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-bl-full"></div>
        </button>

        <!-- Ressources -->
        <button class="bg-white border border-slate-200 p-12 rounded-[3rem] shadow-sm hover:shadow-xl hover:border-blue-600 transition-all group text-left relative overflow-hidden">
            <div class="relative z-10">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="mb-6 text-blue-600 opacity-40 group-hover:rotate-12 transition-transform"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>
                <span class="text-2xl font-black block text-slate-900">Fiches Ressources</span>
                <span class="text-[10px] font-black uppercase tracking-[0.2em] text-blue-600">Générer par parcours</span>
            </div>
            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-bl-full"></div>
        </button>
    </div>
</div>
{% endblock %}
