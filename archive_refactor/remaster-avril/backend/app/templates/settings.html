{% extends "dashboard.html" %}

{% block content %}
<div class="space-y-8 animate-in fade-in duration-500">
    <header>
        <h2 class="text-3xl font-black tracking-tight italic">Paramètres Globaux</h2>
        <p class="text-slate-400 font-bold">Configuration du domaine, SMTP et API Keycloak</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="bg-white rounded-[3rem] p-10 border border-slate-200 shadow-sm space-y-6">
            <h3 class="text-xl font-black italic text-blue-600 mb-4">Infrastructure Réseau</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 px-2">Domaine Principal</label>
                    <input type="text" value="educ-ai.fr" class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-slate-700 focus:ring-2 focus:ring-blue-100">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 px-2">Serveur SMTP</label>
                    <input type="text" value="smtp.univ-lehavre.fr" class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-slate-700 focus:ring-2 focus:ring-blue-100">
                </div>
            </div>
            <button class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-xs uppercase tracking-[0.2em] mt-4">Enregistrer les réglages</button>
        </div>

        <div class="bg-blue-50 rounded-[3rem] p-10 border border-blue-100 flex flex-col items-center justify-center text-center">
            <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center text-blue-600 shadow-lg mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <h3 class="text-xl font-black mb-2 italic">Certificats SSL</h3>
            <p class="text-sm text-blue-600 font-bold opacity-60">Gérés automatiquement via Cloudflare Tunnel</p>
        </div>
    </div>
</div>
{% endblock %}
