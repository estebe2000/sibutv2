{% extends "dashboard.html" %}

{% block content %}
<div class="space-y-8 animate-in fade-in duration-500">
    <header>
        <h2 class="text-3xl font-black tracking-tight italic">Rapport de Gouvernance</h2>
        <p class="text-slate-400 font-bold">Analyse stratégique et conformité du référentiel</p>
    </header>

    <div class="bg-white rounded-[3rem] p-12 border border-slate-200 shadow-sm">
        <div class="flex flex-col items-center justify-center text-center py-20">
            <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center mb-6 shadow-lg shadow-blue-100">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <h3 class="text-2xl font-black mb-2 italic">Génération du Rapport</h3>
            <p class="text-slate-400 max-w-sm font-medium mb-8">Le rapport consolide les données de validation des compétences par promotion.</p>
            <button class="px-8 py-4 bg-slate-900 text-white rounded-2xl font-black text-xs uppercase tracking-[0.2em] hover:bg-blue-600 transition-all">Télécharger le PDF</button>
        </div>
    </div>
</div>
{% endblock %}
