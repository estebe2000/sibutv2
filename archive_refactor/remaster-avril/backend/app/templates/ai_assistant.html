{% extends "dashboard.html" %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/markdown-it@14.0.0/dist/markdown-it.min.js"></script>

<div class="space-y-8 animate-in fade-in duration-500" x-data="{ 
    mode: 'general',
    showGED: false,
    modes: {
        'general': { label: 'Général', icon: 'M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0 M12 10m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0' },
        'exercices': { label: 'Exercices', icon: 'M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0 M9 12l2 2l4 -4' },
        'cours': { label: 'Cours', icon: 'M3 19a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v0a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2z' }
    }
}">
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
        <div class="flex items-center gap-4">
            <div>
                <h2 class="text-3xl font-black tracking-tight text-slate-800 uppercase italic">Assistant IA <span class="text-blue-600">RAGFlow</span></h2>
                <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mt-1">Expert Référentiel & Personnel</p>
            </div>
            <a href="/settings" class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400 hover:text-blue-600 hover:bg-blue-50 transition-all border border-slate-100">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            </a>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="flex bg-slate-100 p-1 rounded-2xl gap-1">
                <template x-for="(data, key) in modes">
                    <button @click="mode = key" :class="mode === key ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all" x-text="data.label"></button>
                </template>
            </div>
            <button @click="showGED = !showGED" class="px-6 py-3 bg-slate-900 text-white rounded-2xl font-black text-xs uppercase tracking-widest hover:scale-105 transition-all flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M9 15h6"/></svg>
                Ma GED IA
            </button>
        </div>
    </header>

    <div class="flex gap-8 h-[calc(100vh-250px)]">
        <div class="flex-1 bg-slate-900 rounded-[3.5rem] p-10 text-white shadow-2xl relative overflow-hidden flex flex-col border border-white/5">
            <div id="chat-window" class="flex-1 space-y-8 overflow-y-auto mb-8 pr-6 custom-scrollbar scroll-smooth">
                <div class="flex gap-4">
                    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shrink-0 shadow-lg"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/></svg></div>
                    <div class="bg-white/10 p-6 rounded-[2.5rem] max-w-2xl font-medium text-sm border border-white/5">Bonjour <strong>{{ user.full_name }}</strong> ! Je suis prêt en mode <span class="text-blue-400 font-black uppercase" x-text="modes[mode].label"></span>.</div>
                </div>
            </div>
            
            <div class="relative">
                <form hx-post="/api/v1/ai/chat" hx-target="#chat-window" hx-swap="beforeend" hx-indicator="#loading-spinner" onsubmit="handleChatSubmit(this)">
                    <input type="hidden" name="mode" :value="mode">
                    <div class="relative flex items-center">
                        <div class="absolute left-4"><label class="w-12 h-12 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center text-white/40 hover:text-white cursor-pointer"><input type="file" name="ephemeral_file" class="hidden" onchange="uploadEphemeral(this)"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/></svg></label></div>
                        <input type="text" id="chat-input" name="message" placeholder="Posez votre question..." class="w-full p-8 pl-20 bg-white/5 border border-white/10 rounded-[2.5rem] font-bold text-white outline-none focus:ring-4 focus:ring-blue-500/20 transition-all text-sm" required autocomplete="off">
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center gap-4"><div id="loading-spinner" class="htmx-indicator animate-pulse text-blue-500">...</div><button type="submit" class="p-5 bg-blue-600 text-white rounded-[1.5rem] shadow-xl hover:bg-blue-500 transition-all"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg></button></div>
                    </div>
                </form>
                <div id="ephemeral-badge" class="hidden absolute -top-12 left-6 bg-blue-600 text-white px-4 py-1.5 rounded-full text-[10px] font-black uppercase flex items-center gap-2"><span id="ephemeral-filename">doc.pdf</span><button onclick="clearEphemeral()">×</button></div>
            </div>
        </div>

        <div id="ged-panel" x-show="showGED" class="w-96 bg-white rounded-[3.5rem] border border-slate-100 shadow-xl flex flex-col overflow-hidden animate-in slide-in-from-right-10 duration-500">
            <div class="p-8 border-b border-slate-50 flex justify-between items-center"><h3 class="font-black text-slate-800 uppercase italic tracking-tight">Ma Base Permanente</h3><button @click="showGED = false" class="text-slate-300 hover:text-slate-600"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button></div>
            <div class="p-8 flex-1 overflow-y-auto custom-scrollbar space-y-6">
                <div class="p-6 bg-blue-50 rounded-[2rem] border-2 border-dashed border-blue-200 text-center relative"><input type="file" class="absolute inset-0 opacity-0 cursor-pointer" onchange="uploadToGED(this)"><p class="text-xs font-black text-blue-600 uppercase">Ajouter un document</p></div>
                <div id="ged-doc-list" hx-get="/api/v1/ai/ged/list" hx-trigger="load, gedUpdate from:body" class="space-y-3"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const md = window.markdownit({ html: true, linkify: true });
    function handleChatSubmit(form) { setTimeout(() => { form.querySelector('#chat-input').value = ''; clearEphemeral(); }, 100); }
    function uploadEphemeral(input) { if (input.files[0]) { document.getElementById('ephemeral-badge').classList.remove('hidden'); document.getElementById('ephemeral-filename').innerText = input.files[0].name; } }
    function clearEphemeral() { const input = document.querySelector('input[name=ephemeral_file]'); if (input) input.value = ''; document.getElementById('ephemeral-badge').classList.add('hidden'); }
    function formatAndAnimateMessage(id, raw) { const c = document.getElementById(id); if (c) { c.innerHTML = md.render(raw); document.getElementById('chat-window').scrollTo({ top: document.getElementById('chat-window').scrollHeight }); } }
    async function uploadToGED(input) {
        if (!input.files[0]) return;
        const fd = new FormData(); fd.append('file', input.files[0]);
        try { const resp = await fetch('/api/v1/ai/ged/upload', { method: 'POST', body: fd }); if (resp.ok) document.body.dispatchEvent(new Event('gedUpdate')); } catch (e) { alert('Erreur'); }
        input.value = '';
    }
</script>
<style>
    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); border-radius: 20px; }
</style>
{% endblock %}
