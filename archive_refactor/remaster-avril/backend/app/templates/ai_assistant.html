{% extends "dashboard.html" %}

{% block content %}
<div class="space-y-8 animate-in fade-in duration-500">
    <header>
        <h2 class="text-3xl font-black tracking-tight italic">Assistant IA Pédagogique</h2>
        <p class="text-slate-400 font-bold">Connecté à LocalAI : llama-3.2-3b</p>
    </header>

    <div class="bg-indigo-900 rounded-[3rem] p-12 text-white shadow-2xl relative overflow-hidden flex flex-col min-h-[600px] border border-white/5">
        <!-- Zone de messages -->
        <div id="chat-window" class="flex-1 space-y-8 overflow-y-auto mb-8 pr-4 custom-scrollbar">
            <div class="flex gap-4">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
                </div>
                <div class="bg-white/10 p-6 rounded-[2.5rem] max-w-lg font-medium text-sm leading-relaxed border border-white/5">
                    Bonjour {{ user.full_name }} ! Je suis prêt à vous aider sur le référentiel BUT TC. Que voulez-vous savoir ?
                </div>
            </div>
        </div>
        
        <!-- Formulaire de saisie -->
        <form hx-post="/ai/chat" 
              hx-target="#chat-window" 
              hx-swap="beforeend" 
              hx-indicator="#loading-spinner"
              onsubmit="setTimeout(() => this.reset(), 10)"
              class="relative mt-auto">
            <input type="text" 
                   name="message"
                   placeholder="Posez une question sur les compétences ou les SAÉ..." 
                   class="w-full p-6 bg-white/10 border border-white/10 rounded-[2rem] font-bold text-white shadow-xl outline-none pr-32 placeholder:text-white/20 focus:ring-4 focus:ring-blue-500/20 transition-all"
                   required>
            
            <div class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center gap-2">
                <div id="loading-spinner" class="htmx-indicator animate-spin mr-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                </div>
                <button type="submit" class="p-4 bg-blue-600 text-white rounded-2xl shadow-lg hover:bg-blue-500 active:scale-95 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                </button>
            </div>
        </form>

        <!-- Effets visuels -->
        <div class="absolute top-0 right-0 w-96 h-96 bg-blue-500/10 rounded-full blur-[120px] -mr-40 -mt-40"></div>
        <div class="absolute bottom-0 left-0 w-64 h-64 bg-indigo-500/5 rounded-full blur-[80px] -ml-20 -mb-20"></div>
    </div>
</div>

<style>
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
</style>
{% endblock %}
