{% extends "dashboard.html" %}

{% block content %}
<div class="space-y-8 animate-in zoom-in-95 duration-500">
    <header>
        <h2 class="text-3xl font-black tracking-tight italic">{{ title }}</h2>
        <p class="text-slate-400 font-bold">Accès aux services collaboratifs unifiés</p>
    </header>

    <div class="bg-white rounded-[3rem] p-20 border border-slate-200 shadow-sm text-center relative overflow-hidden">
        <div class="relative z-10">
            <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl mx-auto flex items-center justify-center mb-8 shadow-lg shadow-blue-100">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            </div>
            <h3 class="text-2xl font-black mb-4 italic">Service de Connexion SSO</h3>
            <p class="text-slate-400 max-w-md mx-auto font-medium mb-10">Vous allez être redirigé vers l'instance externe sécurisée via votre compte IUT APC.</p>
            <button class="px-10 py-5 bg-blue-600 text-white rounded-[2rem] font-black text-xs uppercase tracking-[0.2em] shadow-xl shadow-blue-200 hover:scale-105 active:scale-95 transition-all">Ouvrir {{ title }}</button>
        </div>
        <div class="absolute top-0 right-0 w-64 h-64 bg-blue-500/5 rounded-full blur-[100px] -mr-32 -mt-32"></div>
    </div>
</div>
{% endblock %}
