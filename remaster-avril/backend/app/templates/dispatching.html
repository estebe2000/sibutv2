{% extends "dashboard.html" %}

{% block content %}
<div class="space-y-8 animate-in slide-in-from-right duration-500">
    <header>
        <h2 class="text-3xl font-black tracking-tight italic">Dispatching des Activités</h2>
        <p class="text-slate-400 font-bold">Attribution des SAÉ et Ressources aux responsables</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="bg-white rounded-[3rem] p-10 border border-slate-200 shadow-sm relative overflow-hidden">
            <h3 class="text-xl font-black mb-6 text-indigo-600">Flux de Distribution</h3>
            <div class="h-64 bg-slate-50 rounded-2xl flex items-center justify-center border border-dashed border-slate-200">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-slate-300"><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></svg>
            </div>
            <p class="mt-6 text-sm text-slate-400 font-medium italic">Outil de glisser-déposer pour affecter les intervenants.</p>
        </div>

        <div class="bg-indigo-900 rounded-[3rem] p-10 text-white shadow-2xl">
            <h3 class="text-xl font-black mb-6">Résumé des affectations</h3>
            <div class="space-y-4">
                <div class="flex justify-between border-b border-white/10 pb-2">
                    <span class="text-sm font-bold opacity-60">Responsables nommés</span>
                    <span class="font-black text-indigo-400">14</span>
                </div>
                <div class="flex justify-between border-b border-white/10 pb-2">
                    <span class="text-sm font-bold opacity-60">Activités orphelines</span>
                    <span class="font-black text-red-400">3</span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
