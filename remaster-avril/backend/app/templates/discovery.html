{% extends "dashboard.html" %}

{% block content %}
<div class="space-y-8 animate-in zoom-in-95 duration-500">
    <header>
        <h2 class="text-3xl font-black tracking-tight italic">Explorateur du Référentiel</h2>
        <p class="text-slate-400 font-bold">Visualisation interactive des liens SAÉ / Compétences</p>
    </header>

    <div class="bg-slate-900 rounded-[3rem] p-20 text-white text-center shadow-2xl relative overflow-hidden">
        <div class="relative z-10">
            <div class="w-20 h-20 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center mb-8 shadow-xl">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </div>
            <h3 class="text-2xl font-black mb-4">Moteur de Découverte</h3>
            <p class="text-blue-200/60 max-w-md mx-auto font-medium">Cette section permettra de naviguer dans le graphe des compétences via une interface 3D ou un plan interactif.</p>
            <button class="mt-8 px-8 py-4 bg-blue-600 rounded-2xl font-black text-xs uppercase tracking-[0.2em] hover:bg-blue-500 transition-all">Lancer l'exploration</button>
        </div>
        <div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_center,rgba(37,99,235,0.1)_0%,transparent_70%)]"></div>
    </div>
</div>
{% endblock %}
